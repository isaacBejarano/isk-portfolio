<!-- * Navigation - UI * -->
<isk-header
  iskAnchorObserved
  ($iskAnchor)="onSectionActive($event)"
  id="header"
  data-order="0"
  [storeNav]="storeNav()">
  <!-- ($anchor)="onSectionActive($event)" -->
  <isk-follow
    css="flex gap-2 p-2 border border-amber-500/30 text-amber-500 rounded-sm"
    [showFollow]="false"
    [follow]="follow()" />
</isk-header>

<!-- ^^ ROUTER - pages ^^ -->
<main class="max-w-5xl mx-auto">
  <router-outlet />
</main>

<!-- * Footer - UI * -->
<isk-footer
  iskAnchorObserved
  ($iskAnchor)="onSectionActive($event)"
  id="footer"
  data-order="4"
  class="relative"
  [footer]="footer()">
  <isk-follow
    css="absolute z-5 bottom-0 right-0 xl:right-1/20 2xl:right-1/8 flex flex-col md:flex-row gap-2 p-2 border border-amber-500/30 text-amber-500 rounded-sm m-2"
    [showFollow]="false"
    [follow]="follow()" />
</isk-footer>
