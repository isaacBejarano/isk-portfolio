<!-- * Navigation - UI * -->
<isk-header [navbar]="navbar()" [scrolling]="scrolling()">
  <isk-follow
    css="flex gap-2 p-2 border border-amber-500/30 text-amber-500 rounded-sm"
    [showFollow]="false"
    [follow]="follow()" />
</isk-header>

<!-- ^^ ROUTER - pages ^^ -->
<main class="max-w-5xl mx-auto">
  <router-outlet />
</main>

<!-- * Footer - UI * -->
<isk-footer class="relative" [footer]="footer()">
  <isk-follow
    css="absolute z-5 bottom-0 right-0 xl:right-1/20 2xl:right-1/8 flex gap-2 p-2 border border-amber-500/30 text-amber-500 rounded-sm m-2"
    [showFollow]="false"
    [follow]="follow()" />
</isk-footer>
