<!-- Footer-->
<footer
  class="footer text-center m-0 p-0 bg-linear-to-b from-stone-900 to-stone-950">
  <!-- PROJECTED CONTENT -->
  <ng-content />

  <!-- Copyright Section-->
  <div class="copyright py-4">
    <span class="text-center text-white/75"> Made with ❤️ with </span>
    <div class="flex justify-center items-center mt-2">
      <a
        class="block w-27"
        [href]="footer().tools[0][1]"
        rel="nofollow noreferrer"
        target="_blank"
        (click)="isOpenLink()">
        <!-- ANGULAR SVG -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 223 236"
          height="65"
          class="mx-auto">
          <g clip-path="url(#a)">
            <path
              fill="url(#b)"
              d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"></path>
            <path
              fill="url(#c)"
              d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"></path>
          </g>
          <defs>
            <linearGradient
              id="b"
              x1="49.009"
              x2="225.829"
              y1="213.75"
              y2="129.722"
              gradientUnits="userSpaceOnUse">
              <stop stop-color="#E40035"></stop>
              <stop offset=".24" stop-color="#F60A48"></stop>
              <stop offset=".352" stop-color="#F20755"></stop>
              <stop offset=".494" stop-color="#DC087D"></stop>
              <stop offset=".745" stop-color="#9717E7"></stop>
              <stop offset="1" stop-color="#6C00F5"></stop>
            </linearGradient>
            <linearGradient
              id="c"
              x1="41.025"
              x2="156.741"
              y1="28.344"
              y2="160.344"
              gradientUnits="userSpaceOnUse">
              <stop stop-color="#FF31D9"></stop>
              <stop offset="1" stop-color="#FF5BE1" stop-opacity="0"></stop>
            </linearGradient>
            <clipPath id="a">
              <path fill="#fff" d="M0 0h223v236H0z"></path>
            </clipPath>
          </defs>
        </svg>
        <span class="capitalize text-white"> {{ footer().tools[0][0] }} </span>
      </a>

      <span class="block mx-2 text-white/50 self-end">&</span>

      <a
        class="block"
        [href]="footer().tools[1][1]"
        rel="nofollow noreferrer"
        target="_blank"
        (click)="isOpenLink()">
        <!-- TAILWIND SVG -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="65"
          class="w-27 mx-auto">
          <path
            d="M52.898 0C38.792 0 29.976 7.053 26.45 21.16c5.29-7.054 11.462-9.699 18.515-7.935 4.024 1.005 6.9 3.926 10.084 7.157 5.186 5.264 11.189 11.357 24.3 11.357 14.106 0 22.922-7.053 26.449-21.16-5.29 7.054-11.462 9.699-18.515 7.935-4.024-1.005-6.9-3.926-10.084-7.157C72.012 6.093 66.01 0 52.898 0zM26.45 31.739c-14.106 0-22.922 7.053-26.449 21.16 5.29-7.054 11.461-9.699 18.514-7.935 4.025 1.007 6.9 3.926 10.084 7.157 5.186 5.264 11.19 11.357 24.3 11.357 14.107 0 22.923-7.053 26.45-21.16-5.29 7.054-11.462 9.699-18.515 7.935-4.024-1.005-6.9-3.926-10.084-7.156-5.186-5.265-11.189-11.358-24.3-11.358z"
            fill="#38bdf8" />
        </svg>
        <span class="capitalize text-white"> {{ footer().tools[1][0] }} </span>
      </a>
    </div>

    <small class="block text-white/75 mt-4">
      by {{ footer().copyright }}, {{ year }}
    </small>
  </div>
</footer>
