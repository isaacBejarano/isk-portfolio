@let lastItem = getLast(portfolio().items); @let common = portfolio().common;

<isk-masterhead id="masterhead" [masterhead]="masterhead()" />

<isk-featured id="featured" [featured]="featured()" [lastItem]="lastItem">
  <p class="text-justify">{{ lastItem.p1 }}</p>
  <p class="mb-4 text-justify">
    {{ common.dontforget }}
    <a
      [href]="lastItem.link2"
      rel="nofollow noreferrer"
      target="_blank"
      (click)="isOpenLink()">
      {{ lastItem.host }}
    </a>
    <span class="text-gray"> {{ lastItem.p2 }} </span>
  </p>
</isk-featured>

<isk-portfolio id="portfolio" [portfolio]="portfolio()" />

<isk-skills id="skills" [skills]="skills()" />
