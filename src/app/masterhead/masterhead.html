<header class="masthead bg-custom-dark text-white text-center bg-neutral-500">
  <!-- Avatar -->
  <img
    class="border border-dark rounded masthead-avatar mb-5"
    [src]="masterhead().src"
    [alt]="masterhead().alt" />

  <!--  Heading-->
  <h1 class="masthead-heading text-uppercase mb-0">{{ masterhead().name }}</h1>

  <isk-divider css="bg-gray-800" />

  <!-- Subheading-->
  <p class="masthead-subheading font-weight-light mb-0">
    {{ masterhead().title }}
  </p>
</header>
