<!-- Navigation-->
  <header class="max-w-5xl mx-auto flex flex-wrap gap-2 justify-between align-middle p-2 bg-neutral-900 border border-amber-400/30">

    <div class="flex-1 flex justify-between align-middle gap-2 p-2 border border-pink-400/30 bg-neutral-800/30 ">
      <a class="w-20 block border border-amber-400/30 self-center md:cursor-auto"
      routerLink=""
      rel="nofollow noreferrer"
      (click)="toggle(false)"
      >
        <img [src]="navbar.src" [alt]="navbar.alt"/>
      </a>

      <nav class="w-full relative z-5 p-2" >
        <ol class="absolute w-full top-0 left-0 flex-wrap justify-end text-amber-400/80 md:relative md:flex md:gap-4 md:justify-start"
        [class.hidden]="collapsed()"
        >
          <li class="block md:inline-block p-2 bg-gray-900/95 hover:bg-yellow-900/95 rounded-t-sm border-t border-amber-400/30 md:rounded-sm md:border-0" >
            <a class="block uppercase text-right"
            [href]="hashIt(navbar.page1)" rel="nofollow noreferrer">
              {{ navbar.page1 }}
            </a>
          </li>
          <li class="block md:inline-block p-2 bg-gray-800/95 hover:bg-yellow-900/95 md:rounded-sm">
            <a class="block uppercase text-right"
            [href]="hashIt(navbar.page2)" rel="nofollow noreferrer">
              {{ navbar.page2 }}
            </a>
          </li>
          <li class="block md:inline-block p-2 bg-gray-900/95 hover:bg-yellow-900/95 rounded-b-sm md:rounded-sm">
            <a class="block uppercase text-right"
            [href]="hashIt(navbar.page3)" rel="nofollow noreferrer">
              {{ navbar.page3 }}
            </a>
          </li>
        </ol>
      </nav>
    </div>

    <!-- Projection -->
    <div>
      <ng-content></ng-content>
    </div>

  </header>
