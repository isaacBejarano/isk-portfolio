<!-- Navigation-->
<nav class="lg:w-5xl lg:mx-auto flex flex-wrap justify-between p-2 bg-neutral-900 border border-amber-400">
  <div class="felx-1 border border-pink-400 bg-emerald-900" >
    <a class="block border border-amber-400"
      routerLink=""
      rel="nofollow noreferrer">
      <img [src]="navbar.src" [alt]="navbar.alt" />
    </a>

    <button
      class="uppercase italic border border-cyan-500 p-2"
      type="button"
      data-toggle="collapse"
      data-target="#navbarResponsive"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation">
      {{ navbar.hamburger }}
          <!-- FIXME: faBars -->
      <svg class="size-10 p-2 stroke-current stroke-2" viewBox="0 0 100 100">
        <use href="./svg/icon-sprite.xml#icon-plus"/>
      </svg>
    </button>

    <div class="border border-pink-400 p-2" id="navbarResponsive">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item mx-0 mx-lg-1">
          <a
            class="nav-link py-1 px-0 mx-lg-2 text-uppercase js-scroll-trigger"
            [href]="hashIt(navbar.home)"
            rel="nofollow noreferrer">
            <span> {{ navbar.home }} </span>
          </a>
        </li>
        <li class="nav-item mx-0 mx-lg-1">
          <a
            class="nav-link py-1 px-0 mx-lg-2 text-uppercase js-scroll-trigger"
            [href]="hashIt(navbar.page1)"
            rel="nofollow noreferrer">{{ navbar.page1 }}
          </a>
        </li>
        <li class="nav-item mx-0 mx-lg-1">
          <a
            class="nav-link py-1 px-0 mx-lg-2 text-uppercase js-scroll-trigger"
            [href]="hashIt(navbar.page2)"
            rel="nofollow noreferrer">{{ navbar.page2 }}
          </a>
        </li>
        <li class="nav-item mx-0 mx-lg-1">
          <a
            class="nav-link py-1 px-0 mx-lg-2 text-uppercase js-scroll-trigger"
            [href]="hashIt(navbar.page3)"
            rel="nofollow noreferrer">{{ navbar.page3 }}
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Projection -->
  <ng-content/>
</nav>
