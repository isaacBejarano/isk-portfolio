<!-- * Masthead * -->
<isk-masterhead id="home" />

<!-- * Featured ~New * -->
<isk-featured id="new" [new]="propNew">
  <!-- CUSTOM - Portfolio Modal - Text -->
  <p class="text-justify">
    {{ lastWork.p1 }}
  </p>

  <p class="mb-4 text-justify">
    {{ portfolioCommon.dontforget }}
    <a [href]="lastWork.link2" rel="nofollow noreferrer" target="_blank" (click)="openLink()">
      {{ lastWork.host }}
    </a>

    <!-- AUX -->
    <span class="text-gray">
            {{ lastWork.p2 }}
    </span>
  </p>
 </isk-featured>

<!-- * Potfolio * -->
<isk-portfolio id="portfolio" />

<!-- * Skills * -->
<isk-skills id="technologies" />
