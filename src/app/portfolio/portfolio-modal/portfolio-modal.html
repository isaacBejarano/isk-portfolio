<!-- FIXME: remove component -->

<div
  class="portfolio-modal modal my-fade text-white"
  [id]="item().id"
  tabindex="-1"
  role="dialog"
  [attr.aria-labelledby]="item().label"
  aria-hidden="true">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">
      <button
        class="close text-custom"
        type="button"
        data-dismiss="modal"
        aria-label="Close">
        <span aria-hidden="true">
          <!-- faTimes FIXME: -->
          <svg
            class="size-10 p-2 stroke-current stroke-2"
            viewBox="0 0 100 100">
            <use href="./svg/icon-sprite.xml#icon-plus" />
          </svg>
        </span>
      </button>
      <div class="modal-body text-center text-white">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-8">
              <!-- Portfolio Modal - Title-->
              <h2
                class="portfolio-modal-title text-secondary text-uppercase mb-0"
                [id]="item().label">
                {{ item().title }}
              </h2>
              <!-- Icon Divider-->
              <isk-divider css="bg-gray-800" />

              <!-- Portfolio Modal - Image-->
              <img
                class="border border-secondary img-fluid-override rounded mb-5"
                [src]="[`/img/${item().src}`]"
                [alt]="item().alt" />

              <!-- PROJECTED CONTENT -->
              <ng-content />

              <button class="btn btn-outline-dark" data-dismiss="modal">
                <!-- faTimes FIXME: -->
                <svg
                  class="size-10 p-2 stroke-amber-500 stroke-2 rotate-45"
                  viewBox="0 0 100 100">
                  <use href="./svg/icon-sprite.xml#icon-plus" />
                </svg>
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
